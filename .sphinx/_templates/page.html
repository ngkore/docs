{% extends "!page.html" %} {% block extrahead %} {{ super() }}
<meta name="theme-color" content="#2196F3" />

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechnicalArticle",
    "publisher": {
      "@type": "Organization",
      "name": "NgKore Foundation",
      "url": "https://docs.ngkorefoundation.org",
      "logo": {
        "@type": "ImageObject",
        "url": "https://docs.ngkorefoundation.org/_static/ngkore-logo.png"
      }
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{% if pageurl %}{{ pageurl|e }}{% else %}https://docs.ngkorefoundation.org/{% endif %}"
    },
    "headline": "{{ title|striptags|e }}",
    "description": "{% if meta and meta.description %}{{ meta.description|e }}{% else %}{{ title|striptags|e }} - NgKore documentation on Quantum Safe Network, PQC, eBPF, 5G Advanced, 6G, O-RAN, NTN, AI/ML, Blockchain, and Quantum Simulations.{% endif %}",
    "keywords": "{% if meta and meta.keywords %}{{ meta.keywords|e }}{% else %}5G core, PQC, post-quantum cryptography, eBPF, O-RAN, 6G, NTN, AI/ML, Blockchain, Quantum Simulations, NgKore{% endif %}"
  }
</script>

{% if parents %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "NgKore Docs",
        "item": "https://docs.ngkorefoundation.org/"
      }
      {% for parent in parents -%}
      ,{
        "@type": "ListItem",
        "position": {{ loop.index + 1 }},
        "name": "{{ parent.title|striptags|e }}",
        "item": "https://docs.ngkorefoundation.org{{ parent.link|e }}"
      }
      {%- endfor %}
      ,{
        "@type": "ListItem",
        "position": {{ parents|length + 2 }},
        "name": "{{ title|striptags|e }}",
        "item": "{% if pageurl %}{{ pageurl|e }}{% else %}https://docs.ngkorefoundation.org/{% endif %}"
      }
    ]
  }
</script>
{% endif %} {% endblock %}
